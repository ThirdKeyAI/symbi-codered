[tool]
name = "tfsec"
version = "1.0.0"
binary = "codered"
description = "tfsec — Terraform-specific static analysis (faster than checkov, complementary rules)"
timeout_seconds = 60
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered tfsec --engagement {engagement_id}"

[output]
format = "json"
envelope = true
