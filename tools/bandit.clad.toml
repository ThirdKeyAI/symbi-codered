[tool]
name = "bandit"
version = "1.0.0"
binary = "codered"
description = "Bandit Python security linter (via scanner sidecar)"
timeout_seconds = 180
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.target_dir]
position = 1
required = true
type = "file_path"

[command]
template = "codered hunt --tool bandit --dir {target_dir}"

[output]
format = "json"
envelope = true
