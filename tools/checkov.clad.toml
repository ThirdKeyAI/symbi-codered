[tool]
name = "checkov"
version = "1.0.0"
binary = "codered"
description = "checkov — Terraform / CloudFormation / Kubernetes / Helm / Dockerfile / GitHub Actions IaC policy checks"
timeout_seconds = 120
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered checkov --engagement {engagement_id}"

[output]
format = "json"
envelope = true
