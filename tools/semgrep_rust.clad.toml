[tool]
name = "semgrep_rust"
version = "1.0.0"
binary = "codered"
description = "Semgrep with the Rust ruleset (via Rust scanner sidecar)"
timeout_seconds = 120
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered semgrep_rust --engagement {engagement_id}"

[output]
format = "json"
envelope = true
