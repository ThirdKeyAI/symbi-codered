[tool]
name = "ruff_security"
version = "1.0.0"
binary = "codered"
description = "Ruff with --select=S (bandit-equivalent security rules)"
timeout_seconds = 120
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.target_dir]
position = 1
required = true
type = "file_path"

[command]
template = "codered hunt --tool ruff_security --dir {target_dir}"

[output]
format = "json"
envelope = true
