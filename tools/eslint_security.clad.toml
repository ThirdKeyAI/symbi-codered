[tool]
name = "eslint_security"
version = "1.0.0"
binary = "codered"
description = "ESLint with security + no-unsanitized plugins for JS/TS (via TypeScript scanner sidecar)"
timeout_seconds = 60
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered eslint_security --engagement {engagement_id}"

[output]
format = "json"
envelope = true
