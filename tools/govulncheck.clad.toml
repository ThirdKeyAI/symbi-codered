[tool]
name = "govulncheck"
version = "1.0.0"
binary = "codered"
description = "govulncheck (Go vuln DB + reachability) via Go scanner sidecar"
timeout_seconds = 180
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered govulncheck --engagement {engagement_id}"

[output]
format = "json"
envelope = true
