[tool]
name = "pip_audit"
version = "1.0.0"
binary = "codered"
description = "pip-audit (OSV + PyPI advisory DB) — dependency vulnerabilities"
timeout_seconds = 180
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.target_dir]
position = 1
required = true
type = "file_path"

[command]
template = "codered hunt --tool pip_audit --dir {target_dir}"

[output]
format = "json"
envelope = true
