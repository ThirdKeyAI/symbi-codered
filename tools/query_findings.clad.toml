[tool]
name = "query_findings"
version = "1.0.0"
binary = "codered"
description = "Read findings for an engagement (optionally filter by tool_origin)"
timeout_seconds = 5
risk_tier = "low"

[tool.cedar]
resource = "Audit::PatternScout"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[args.tool_origin]
position = 2
required = false
type = "string"

[command]
template = "codered query-findings --engagement {engagement_id} --tool {tool_origin}"

[output]
format = "json"
envelope = false
