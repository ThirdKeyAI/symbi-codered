[tool]
name = "trivy"
version = "1.0.0"
binary = "codered"
description = "trivy fs — container/IaC vuln scan + misconfigurations + secret detection"
timeout_seconds = 180
risk_tier = "low"

[tool.cedar]
resource = "Audit::StaticHunter"
action = "execute_tool"

[args.engagement_id]
position = 1
required = true
type = "string"

[command]
template = "codered trivy --engagement {engagement_id}"

[output]
format = "json"
envelope = true
