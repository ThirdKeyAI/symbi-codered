name: release

# Publishes container images to the Forgejo container registry at git.dx.pe
# only on semver tag pushes (e.g. v0.1.0, v1.2.3). Pushes to main do NOT
# publish — see test.yml for the main-branch validation job.
#
# Required repo secret:
#   REGISTRY_TOKEN — Forgejo PAT with package:write scope on the
#                    ThirdKeyAI/symbi-codered registry namespace.
#   REGISTRY_USER  — Forgejo username that owns the token (e.g. jascha).
#
# Image naming follows the Forgejo nested-image convention:
#   git.dx.pe/ThirdKeyAI/symbi-codered/<short-name>:<tag>
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: orchestrator,        dockerfile: orchestrator/Dockerfile,            context: .                              }
          - { name: scanner-python,      dockerfile: scanners/python/Dockerfile,         context: scanners/python                }
          - { name: scanner-rust,        dockerfile: scanners/rust/Dockerfile,           context: scanners/rust                  }
          - { name: scanner-typescript,  dockerfile: scanners/typescript/Dockerfile,     context: scanners/typescript            }
          - { name: scanner-go,          dockerfile: scanners/go/Dockerfile,             context: scanners/go                    }
          - { name: scanner-java,        dockerfile: scanners/java/Dockerfile,           context: scanners/java                  }
          - { name: scanner-php,         dockerfile: scanners/php/Dockerfile,            context: scanners/php                   }
          - { name: sandbox-python,      dockerfile: scanners/python-sandbox/Dockerfile, context: scanners/python-sandbox        }
          - { name: sandbox-rust,        dockerfile: scanners/rust-sandbox/Dockerfile,   context: scanners/rust-sandbox          }
          - { name: sandbox-typescript,  dockerfile: scanners/typescript-sandbox/Dockerfile, context: scanners/typescript-sandbox }
          - { name: sandbox-go,          dockerfile: scanners/go-sandbox/Dockerfile,     context: scanners/go-sandbox            }
    env:
      REGISTRY: git.dx.pe
      OWNER:    ThirdKeyAI
      REPO:     symbi-codered
    steps:
      - uses: actions/checkout@v4

      - name: derive tag
        id: tag
        run: |
          # GITHUB_REF is e.g. refs/tags/v0.1.0 — strip the prefix.
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: log in to forgejo registry
        run: |
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" \
            --username "$REGISTRY_USER" --password-stdin
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_USER:  ${{ secrets.REGISTRY_USER }}

      - name: build ${{ matrix.image.name }}
        run: |
          IMAGE="$REGISTRY/$OWNER/$REPO/${{ matrix.image.name }}"
          docker build \
            -f "${{ matrix.image.dockerfile }}" \
            -t "$IMAGE:${{ steps.tag.outputs.tag }}" \
            -t "$IMAGE:latest" \
            "${{ matrix.image.context }}"

      - name: push ${{ matrix.image.name }}
        run: |
          IMAGE="$REGISTRY/$OWNER/$REPO/${{ matrix.image.name }}"
          docker push "$IMAGE:${{ steps.tag.outputs.tag }}"
          docker push "$IMAGE:latest"
