name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cargo:
    runs-on: ubuntu-latest
    env:
      # prost-build (used by lance-encoding) needs PROTOC_INCLUDE pointing at
      # the directory that holds google/protobuf/*.proto. When we install
      # protobuf-compiler via apt, those well-known protos land under
      # /usr/include — and prost-build does not infer that location on its
      # own. Without this it fails with "google/protobuf/empty.proto: File not found".
      PROTOC_INCLUDE: /usr/include
    steps:
      # Forgejo Actions mirrors common actions to data.forgejo.org but not
      # every third-party action. Use full https://github.com/... URLs for
      # the ones that aren't mirrored so the runner clones them from upstream.
      - uses: actions/checkout@v4
      # lance-encoding (transitive dep via lancedb) invokes protoc at build
      # time. The catthehacker/ubuntu:act-latest image doesn't ship it.
      # libprotobuf-dev brings the well-known .proto files under /usr/include.
      - name: install protoc + well-known protos
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      # Pinned to v2.7.8 (last release using node20). v2.8.0+ uses node24,
      # which Forgejo act_runner v6.4.0 does not yet support.
      - uses: Swatinem/rust-cache@v2.7.8
      - name: clippy
        run: cargo clippy -j2 --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test -j2 --workspace --all-targets

