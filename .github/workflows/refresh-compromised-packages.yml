name: refresh-compromised-packages

# Daily check for upstream updates to jaschadub/compromised-packages-check.
# When the upstream HEAD differs from the pinned SHA in the scanner
# Dockerfiles, the workflow rebuilds the four scanner images and pushes
# them tagged `:latest-compromised-{date}` so air-gapped operators can
# pull a fresh image without waiting for a tagged release.
#
# Pinning model: each scanner Dockerfile clones the upstream repo at
# build time. This workflow rebuilds the images and republishes them; the
# Dockerfile change of pinning to a specific SHA is left for a follow-up
# when the cost of an unverified daily upstream pull becomes a concern.
#
# Required repo secrets (same as release.yml):
#   REGISTRY_TOKEN — Forgejo PAT with package:write scope
#   REGISTRY_USER  — Forgejo username owning the token

on:
  schedule:
    # 04:17 UTC daily — randomized minute to avoid the top-of-hour herd
    # against api.github.com.
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      should_publish: ${{ steps.upstream.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
      - name: query upstream HEAD
        id: upstream
        run: |
          sha=$(git ls-remote https://github.com/jaschadub/compromised-packages-check.git HEAD | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          if [ -z "$sha" ]; then
            echo "could not resolve upstream HEAD; bailing"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The decision of whether to publish is currently 'always when the
          # cron fires' — once the Dockerfiles pin to a SHA we'll compare
          # against the pinned value here.
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: check-upstream
    if: needs.check-upstream.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: scanner-python,     dockerfile: scanners/python/Dockerfile,     context: scanners/python }
          - { name: scanner-rust,       dockerfile: scanners/rust/Dockerfile,       context: scanners/rust }
          - { name: scanner-typescript, dockerfile: scanners/typescript/Dockerfile, context: scanners/typescript }
          - { name: scanner-java,       dockerfile: scanners/java/Dockerfile,       context: scanners/java }
          - { name: scanner-php,        dockerfile: scanners/php/Dockerfile,        context: scanners/php }
    env:
      REGISTRY: git.dx.pe
      OWNER:    ThirdKeyAI
      REPO:     symbi-codered
    steps:
      - uses: actions/checkout@v4
      - name: derive tag
        id: tag
        run: |
          stamp=$(date -u +%Y-%m-%d)
          sha_short=$(echo "${{ needs.check-upstream.outputs.upstream_sha }}" | cut -c1-7)
          echo "tag=compromised-${stamp}-${sha_short}" >> "$GITHUB_OUTPUT"
      - name: log in to forgejo registry
        run: |
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" \
            --username "$REGISTRY_USER" --password-stdin
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_USER:  ${{ secrets.REGISTRY_USER }}
      - name: build ${{ matrix.image.name }}
        run: |
          IMAGE="$REGISTRY/$OWNER/$REPO/${{ matrix.image.name }}"
          # --no-cache so the git clone inside the Dockerfile re-pulls
          # the upstream repo regardless of buildkit's layer cache.
          docker build --no-cache \
            -f "${{ matrix.image.dockerfile }}" \
            -t "$IMAGE:${{ steps.tag.outputs.tag }}" \
            "${{ matrix.image.context }}"
      - name: push ${{ matrix.image.name }}
        run: |
          IMAGE="$REGISTRY/$OWNER/$REPO/${{ matrix.image.name }}"
          docker push "$IMAGE:${{ steps.tag.outputs.tag }}"
