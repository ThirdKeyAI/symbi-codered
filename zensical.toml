[project]
site_name = "symbi-codered Documentation"
copyright = "Copyright &copy; 2026 ThirdKey. Core licensed under Apache-2.0."
site_url = "https://codered.symbiont.dev/"
site_description = "Governed AI source-code auditor: multi-language SAST + LLM reasoning + sandboxed PoC validation + devil's-advocate rebuttal, with an auditable evidence chain."
repo_url = "https://github.com/ThirdKeyAI/symbi-codered"
repo_name = "ThirdKeyAI/symbi-codered"
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Architecture" = "architecture.md"},
  {"Pipeline Stages" = "pipeline-stages.md"},
  {"Language Coverage" = "language-coverage.md"},
  {"Governance & Trust" = "governance.md"},
  {"CLI Reference" = "cli-reference.md"},
  {"Contributing" = "contributing.md"},
  {"symbiont.dev" = "https://symbiont.dev"},
]

extra_css = ["stylesheets/extra.css"]
extra_javascript = ["javascripts/extra.js"]

[project.theme]
language = "en"

# Dark mode default (slate), with toggle to light. Red accent — it's code red.
[[project.theme.palette]]
scheme = "slate"
primary = "red"
accent = "red"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "red"
accent = "red"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[project.theme.features]
navigation = ["navigation.tabs", "navigation.sections", "navigation.top", "navigation.footer"]
search = ["search.suggest", "search.highlight"]
content = ["content.code.copy"]

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ThirdKeyAI/symbi-codered"
name = "symbi-codered on GitHub"

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://symbiont.dev"
name = "symbiont.dev"

[[project.extra.social]]
icon = "fontawesome/solid/shield-halved"
link = "https://thirdkey.ai"
name = "ThirdKey"
